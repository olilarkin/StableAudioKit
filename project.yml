name: StableAudio3iOS
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "17.0"
packages:
  MLXSwift:
    url: https://github.com/ml-explore/mlx-swift
    revision: 89cece7dcb513a4f3a20a83ece3767ef23665887
  SwiftSentencepiece:
    url: https://github.com/jkrukowski/swift-sentencepiece
    revision: b968826b1d3b76e37359abdbe2f4c0daaa96a50a
targets:
  StableAudio3iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StableAudio3iOS
      - path: Resources/Weights
        type: folder
        buildPhase: resources
    dependencies:
      - package: MLXSwift
        product: MLX
      - package: MLXSwift
        product: MLXNN
      - package: MLXSwift
        product: MLXRandom
      - package: SwiftSentencepiece
        product: SentencepieceTokenizer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.stableaudio3ios
        PRODUCT_NAME: StableAudio3iOS
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Stable Audio 3
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        TARGETED_DEVICE_FAMILY: 1
        SWIFT_VERSION: 6.0
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
